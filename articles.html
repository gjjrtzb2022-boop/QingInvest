<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightVest - 文章库</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="brand-link" aria-label="InsightVest 首页">
          <span class="brand-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 17 9 11l4 4 7-8" />
              <path d="M15 7h5v5" />
            </svg>
          </span>
          <span class="brand-text">InsightVest</span>
        </a>

        <nav class="site-nav" aria-label="主导航">
          <a href="#" data-coming-soon="市场模块将在后续开放">市场</a>
          <a href="#" data-coming-soon="选股模块正在重构中">选股</a>
          <a href="articles.html" class="active">文章</a>
          <a href="#" data-coming-soon="AI问答模块将在后续开放">AI问答</a>
        </nav>

        <div class="header-actions">
          <button id="commandPaletteHint" class="search-hint" type="button">搜索文章、标签、系列... <span>⌘K</span></button>
          <button class="login-btn" type="button" data-coming-soon="登录功能将在后续接入">登录</button>
        </div>
      </div>
    </header>

    <main class="article-page">
      <div class="container">
        <section class="article-overview">
          <div>
            <h1>文章列表</h1>
            <p>共 <span id="articleTotalCount">0</span> 篇文章</p>
          </div>
          <label class="article-search">
            <span>搜索</span>
            <input id="articleSearchInput" placeholder="支持按标题、摘要、标签、个股搜索" />
          </label>
        </section>

        <div class="article-status-tabs" id="statusTabs" data-pill-group>
          <button type="button" class="status-pill active" data-status="all">全部 <span id="statusCountAll">0</span></button>
          <button type="button" class="status-pill" data-status="unread">待阅 <span id="statusCountUnread">0</span></button>
          <button type="button" class="status-pill" data-status="read">已读 <span id="statusCountRead">0</span></button>
          <button type="button" class="status-pill" data-status="favorite">收藏 <span id="statusCountFavorite">0</span></button>
        </div>

        <p id="articleStatusNote" class="article-status-note">正在加载文章索引...</p>

        <div class="article-layout">
          <aside class="article-sidebar panel">
            <section class="side-group">
              <h2>排序</h2>
              <div class="sort-actions" id="sortTabs" data-pill-group>
                <button type="button" class="status-pill active" data-sort="date">按日期</button>
                <button type="button" class="status-pill" data-sort="title">按标题</button>
                <button type="button" class="arrow-btn" id="sortOrderBtn" data-order="desc" aria-label="切换排序方向">↓</button>
              </div>
            </section>

            <section class="side-group">
              <h2>系列</h2>
              <ul id="seriesList" class="empty-list">
                <li>暂无系列</li>
              </ul>
            </section>

            <section class="side-group">
              <h2>其他</h2>
              <ul id="otherList" class="empty-list">
                <li>暂无分类</li>
              </ul>
            </section>
          </aside>

          <section class="article-main">
            <div id="articleCards" class="article-card-list">
              <article class="article-card empty">
                <div>
                  <h2>加载中...</h2>
                  <p>正在读取 Markdown 文章索引，请稍候。</p>
                </div>
                <div class="thumb-placeholder">Loading</div>
              </article>
            </div>
            <div class="pagination-row">
              <button type="button" class="page-btn" disabled>上一页</button>
              <span id="paginationText">1 / 1</span>
              <button type="button" class="page-btn" disabled>下一页</button>
            </div>
          </section>

          <aside class="article-right panel">
            <section class="side-group">
              <h2>标签</h2>
              <div id="tagsCloud" class="empty-chip-wrap">
                <span class="empty-chip">暂无标签</span>
              </div>
            </section>

            <section class="side-group">
              <h2>行业</h2>
              <div id="industriesCloud" class="empty-chip-wrap">
                <span class="empty-chip">暂无行业</span>
              </div>
            </section>

            <section class="side-group">
              <h2>个股</h2>
              <div id="stocksCloud" class="empty-chip-wrap">
                <span class="empty-chip">暂无个股</span>
              </div>
            </section>
          </aside>
        </div>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js" type="module"></script>
  </body>
</html>
