name: CI Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-checks
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check environment (dev target)
        env:
          ARTICLE_SOURCE: github
          ARTICLE_GITHUB_OWNER: gjjrtzb2022-boop
          ARTICLE_GITHUB_REPO: qinginvest-articles
        run: npm run check:env -- --target=dev

      - name: Check DB migrations and rollback rehearsal
        env:
          MIGRATION_CHECK_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55432/postgres
        run: npm run check:migrations

      - name: Verify RLS isolation rules
        env:
          RLS_CHECK_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55432/postgres
        run: npm run verify:rls

      - name: Validate local article directory shape
        run: npm run validate:articles

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        env:
          ARTICLE_SOURCE: github
          ARTICLE_GITHUB_OWNER: gjjrtzb2022-boop
          ARTICLE_GITHUB_REPO: qinginvest-articles
        run: npm run build
